# MISS CLOVER catalog — single source of truth for the storefront.
# Edit this file and re-run `python seed.py` to add / change products.
#
# Required fields per product:
#   slug, name, design_code, color_hex, base_price_cents, variants[]
# Optional but recommended for new designs:
#   description, tile_eyebrow, tile_headline, tile_body,
#   is_featured (drives nav + home tile-split), display_order
#   images[] (each: path under static/img/, alt text, sort_order)

products:

  - slug: classic-tote
    name: The Classic Tote
    design_code: classic
    color_hex: "#F0E6D2"            # the cream colourway
    base_price_cents: 35000
    is_featured: true
    display_order: 10
    description: >-
      The starter MISS CLOVER. Cream leather, gold hardware, structured
      8″×11″ silhouette with a tan-suede interior — lipstick holder, key
      fob, inner zip pocket.
    tile_eyebrow: The Classic
    tile_headline: Cream leather, gold hardware.
    tile_body: >-
      The starter MISS CLOVER. A structured 8″×11″ tote in soft cream
      leather, finished with gold hardware and a tan-suede interior.
    variants:
      - name: Classic
        sku: MC-CLS-CR
        stock_qty: 20
        price_cents: 35000
    images:
      # Drop additional views (e.g. interior.jpg, side.jpg, lifestyle.jpg)
      # into static/img/products/classic/ and add them here in display order.
      - path: products/classic/hero.jpg
        alt: The Classic Tote — front view
        sort_order: 1

  - slug: maroon-tote
    name: The Maroon Tote
    design_code: maroon
    color_hex: "#6E1A2D"            # the burgundy colourway
    base_price_cents: 35000
    is_featured: true
    display_order: 20
    description: >-
      Same silhouette in deep burgundy. Hand-dyed maroon leather, gold
      hardware, suede-lined interior with all the clever pockets.
    tile_eyebrow: The Maroon
    tile_headline: Burgundy. Quietly bold.
    tile_body: >-
      Same silhouette, deeper register. Hand-dyed maroon leather, gold
      hardware, suede-lined.
    variants:
      - name: Maroon
        sku: MC-MRN-BG
        stock_qty: 20
        price_cents: 35000
    images:
      # Drop additional views (e.g. interior.jpg, side.jpg, lifestyle.jpg)
      # into static/img/products/maroon/ and add them here in display order.
      - path: products/maroon/hero.jpg
        alt: The Maroon Tote — front view
        sort_order: 1
